<div #host class="h-full w-full overflow-hidden"></div>

<!-- Ask AI popup (appears on text selection) -->
@if (selectionPopup()) {
  <button
    type="button"
    class="absolute z-20 flex items-center gap-1.5 px-2.5 py-1 rounded-full
           bg-brand text-white text-[11px] font-semibold shadow-lg
           hover:bg-brand/90 active:scale-95 transition-all select-none"
    [style.top.px]="selectionPopup()!.top"
    [style.left.px]="selectionPopup()!.left"
    (mousedown)="$event.preventDefault()"
    (click)="onAskAiClick()"
  >
    <lucide-icon [img]="Sparkles" class="w-3 h-3" aria-hidden="true" />
    Ask AI
  </button>
}

<!-- ── Inline AI command overlay (Ctrl+K) ─────────────────────────────── -->
@if (inlineCmd(); as cmd) {
  <div
    class="absolute z-30"
    [style.top.px]="cmd.top"
    [style.left.px]="cmd.left"
    [style.width.px]="cmd.width"
  >

    <!-- State: input — user types the prompt -->
    @if (cmd.state === 'input') {
      <div class="flex items-center gap-2 bg-surface border border-brand/40
                  rounded-lg shadow-xl px-3 py-2 ring-1 ring-brand/20">
        <lucide-icon [img]="Sparkles" class="w-3.5 h-3.5 text-brand shrink-0" aria-hidden="true" />
        <input
          #inlineInput
          type="text"
          class="flex-1 bg-transparent text-sm text-foreground placeholder:text-muted
                 outline-none min-w-0"
          placeholder="Describe lo que quieres escribir…"
          autocomplete="off"
          spellcheck="false"
          [value]="inlineDraft()"
          (input)="inlineDraft.set($any($event.target).value)"
          (keydown)="onInlineInputKeydown($event)"
        />
        <span class="text-[10px] text-muted shrink-0 select-none">Enter ↵ · Esc</span>
      </div>
    }

    <!-- State: streaming — AI is writing into the document -->
    @if (cmd.state === 'streaming') {
      <div class="flex items-center gap-2 bg-surface border border-brand/30
                  rounded-lg shadow-xl px-3 py-2">
        <lucide-icon [img]="Sparkles" class="w-3.5 h-3.5 text-brand shrink-0 animate-pulse"
                     aria-hidden="true" />
        <span class="text-sm text-muted flex-1">Generando…</span>
        <span class="flex gap-0.5">
          <span class="w-1.5 h-1.5 rounded-full bg-brand animate-bounce"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-brand animate-bounce [animation-delay:100ms]"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-brand animate-bounce [animation-delay:200ms]"></span>
        </span>
      </div>
    }

    <!-- State: done — accept or discard -->
    @if (cmd.state === 'done') {
      <div
        #inlineDone
        tabindex="0"
        class="flex items-center gap-2 bg-surface border border-green-500/40
               rounded-lg shadow-xl px-3 py-2 outline-none cursor-default
               focus:ring-1 focus:ring-green-500/30"
        (keydown)="onInlineDoneKeydown($event)"
      >
        <lucide-icon [img]="Sparkles" class="w-3.5 h-3.5 text-green-500 shrink-0"
                     aria-hidden="true" />
        <span class="text-[11px] text-muted flex-1 select-none">
          <kbd class="px-1 py-0.5 rounded bg-surface-hover border border-border
                      text-[10px] text-foreground font-sans">Tab</kbd>
          · aceptar
        </span>
        <button
          type="button"
          class="text-[11px] text-muted hover:text-red-400 transition-colors shrink-0"
          (mousedown)="$event.preventDefault()"
          (click)="discardInlineInsert()"
        >
          <kbd class="px-1 py-0.5 rounded bg-surface-hover border border-border
                      text-[10px] text-foreground font-sans">Esc</kbd>
          descartar
        </button>
      </div>
    }

  </div>
}

@if (headings().length === 0) {

  <!-- Empty state -->
  <div class="flex flex-col items-center justify-center flex-1 gap-2 px-4 text-center">
    <lucide-icon [img]="AlignLeft" class="w-6 h-6 text-muted/40" aria-hidden="true" />
    <p class="text-xs text-muted leading-relaxed">
      Usa <code class="font-mono text-[11px] bg-surface-hover px-1 rounded">= Título</code>
      para crear secciones navegables.
    </p>
  </div>

} @else {

  <div class="flex-1 overflow-y-auto py-1">
    @for (heading of headings(); track heading.line) {
      <button
        type="button"
        class="w-full flex items-start py-0.5 pr-3 text-left transition-colors
               hover:bg-surface-hover rounded group"
        [style.padding-left.px]="indent(heading.level)"
        (click)="headingClick.emit(heading)"
        [title]="heading.text"
      >
        @if (heading.number) {
          <span class="shrink-0 font-mono tabular-nums text-muted/50
                       group-hover:text-brand/60 transition-colors"
                [class]="heading.level === 1 ? 'text-[11px]' : 'text-[10px]'">
            {{ heading.number }}
          </span>
        }
        <span
          class="truncate leading-snug transition-colors"
          [class]="heading.level === 1
            ? 'text-xs font-semibold text-foreground group-hover:text-brand'
            : heading.level === 2
              ? 'text-xs font-medium text-foreground/80 group-hover:text-brand'
              : heading.level === 3
                ? 'text-[11px] font-normal text-muted group-hover:text-foreground'
                : 'text-[11px] font-normal text-muted/60 italic group-hover:text-muted'"
        >
          {{ heading.text }}
        </span>
      </button>
    }
  </div>

}

<!-- Header -->
<div class="flex items-center gap-2 h-12 px-4 border-b border-border shrink-0 bg-surface">
  <lucide-icon [img]="Sparkles" class="my-icon w-4 h-4 text-brand" aria-hidden="true" />
  <span class="text-sm font-semibold text-foreground">Asistente IA</span>

  @if (isLoading()) {
    <span class="ml-auto flex items-center gap-1 shrink-0" aria-label="Respondiendo">
      <span class="w-1.5 h-1.5 rounded-full bg-brand animate-pulse"></span>
      <span class="w-1.5 h-1.5 rounded-full bg-brand animate-pulse [animation-delay:150ms]"></span>
      <span class="w-1.5 h-1.5 rounded-full bg-brand animate-pulse [animation-delay:300ms]"></span>
    </span>
  }
</div>

<!-- Message list -->
<div class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
  @for (msg of messages(); track $index) {

    @if (msg.role === 'assistant') {
      <div class="flex gap-2.5 items-start">
        <div class="shrink-0 w-6 h-6 rounded-full bg-brand-subtle flex items-center justify-center">
          <lucide-icon [img]="Sparkles" class="w-3 h-3 text-brand" aria-hidden="true" />
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm text-foreground bg-surface rounded-xl rounded-tl-none px-3 py-2 leading-relaxed shadow-sm whitespace-pre-wrap">
            {{ msg.text }}
          </p>
          @if ($last && msg.text && !isLoading()) {
            <button
              type="button"
              class="mt-1.5 flex items-center gap-1.5 text-[11px] text-muted hover:text-brand transition-colors"
              (click)="insertLastResponse()"
              title="Insertar en el editor"
            >
              <lucide-icon [img]="ClipboardPaste" class="w-3 h-3" aria-hidden="true" />
              Insertar en editor
            </button>
          }
        </div>
      </div>

    } @else {
      <div class="flex justify-end">
        <p class="text-sm text-white bg-brand rounded-xl rounded-tr-none px-3 py-2 leading-relaxed max-w-[85%]">
          {{ msg.text }}
        </p>
      </div>
    }

  }
</div>

<!-- Input area -->
<div class="shrink-0 p-3 border-t border-border bg-surface">
  <div class="flex items-end gap-2 rounded-xl border border-border bg-background p-2
              focus-within:ring-2 focus-within:ring-brand/30 focus-within:border-brand/50">
    <textarea
      rows="2"
      placeholder="Describe qué quieres escribir…"
      class="flex-1 resize-none bg-transparent text-sm text-foreground placeholder:text-muted
             outline-none leading-relaxed"
      [value]="draft()"
      (input)="updateDraft($event)"
      (keydown)="onKeydown($event)"
    ></textarea>
    <app-button
      size="sm"
      [icon]="ArrowUp"
      [disabled]="draft().trim().length === 0 || isLoading()"
      [loading]="isLoading()"
      (click)="send()"
      aria-label="Enviar mensaje"
    ></app-button>
  </div>
  <p class="text-[10px] text-muted mt-1.5 text-center">
    Shift + Enter para nueva línea
  </p>
</div>

<app-modal title="Eliminar documento" (close)="cancel.emit()">

  <div class="space-y-5">

    <!-- Icon + message -->
    <div class="flex gap-4">
      <div class="shrink-0 flex items-center justify-center w-10 h-10 rounded-full bg-danger-subtle">
        <lucide-icon [img]="Trash2" class="w-5 h-5 text-danger-text" aria-hidden="true" />
      </div>
      <div class="space-y-1">
        <p class="text-sm font-medium text-foreground">
          ¿Eliminar este documento?
        </p>
        <p class="text-sm text-secondary leading-relaxed">
          Se eliminará
          <span class="font-semibold text-foreground">"{{ documentTitle() }}"</span>
          de forma permanente. Esta acción no se puede deshacer.
        </p>
        @if (warningText()) {
          <p class="text-sm text-warning font-medium mt-1">
            ⚠ {{ warningText() }}
          </p>
        }
      </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-2 pt-1 border-t border-divider">
      <app-button variant="secondary" size="sm" (click)="cancel.emit()">
        Cancelar
      </app-button>
      <button
        type="button"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg
               bg-danger text-white
               hover:bg-red-600 active:bg-red-700
               focus:outline-none focus:ring-2 focus:ring-danger/40
               transition-colors duration-150"
        (click)="confirm.emit()"
      >
        <lucide-icon [img]="Trash2" class="w-3.5 h-3.5" aria-hidden="true" />
        Eliminar
      </button>
    </div>

  </div>

</app-modal>

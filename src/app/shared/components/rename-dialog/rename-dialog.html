<app-modal title="Renombrar documento" (close)="cancel.emit()">

  <div class="space-y-4">

    <!-- Input -->
    <div class="space-y-1.5">
      <label for="doc-title" class="text-sm font-medium text-foreground">
        Nombre del documento
      </label>
      <input
        #titleInput
        id="doc-title"
        type="text"
        class="w-full px-3 py-2 rounded-lg border border-border bg-background
               text-sm text-foreground placeholder:text-muted
               focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand/50
               transition"
        placeholder="Ej: Mi investigación"
        [value]="newTitle()"
        (input)="newTitle.set($any($event.target).value)"
        (keydown)="onKeydown($event)"
      />
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-2 pt-1">
      <app-button variant="secondary" size="sm" (click)="cancel.emit()">
        Cancelar
      </app-button>
      <app-button
        variant="primary"
        size="sm"
        [disabled]="newTitle().trim().length === 0"
        (click)="submit()"
      >
        Renombrar
      </app-button>
    </div>

  </div>

</app-modal>

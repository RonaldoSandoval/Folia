<!--
  role="status" announces a live region to screen readers.
  The visible ring is aria-hidden; the sr-only span carries the label.
-->
<span role="status" class="inline-flex flex-col items-center justify-center gap-2">
  <span aria-hidden="true" [class]="ringClasses()"></span>

  @if (label()) {
    <span class="text-sm text-muted">
      {{ label() }}
    </span>
  }

  <span class="sr-only">{{ label() }}</span>
</span>
